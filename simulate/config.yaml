robot_scene: "scene.xml" # VBot scene, /vbot/xmls/scene.xml

domain_id: 0  # Domain id
interface: "wlp132s0" # Interface

use_joystick: 1
joystick_type: "keyboard" # support "xbox", "switch", "keyboard" gamepad layout
joystick_device: "/dev/input/js0" # Device path
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy

print_scene_information: 1 # Print link, joint and sensors information of robot

enable_elastic_band: 0 # Virtual spring band, used for lifting
